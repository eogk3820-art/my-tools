<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { color: #2c3e50; margin-bottom: 8px; font-size: 24px; }
        .login-box p { color: #999; font-size: 13px; margin-bottom: 24px; }

        /* 탭 */
        .tabs { display: flex; margin-bottom: 28px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .tab { flex: 1; padding: 11px; background-color: #f9f9f9; color: #999; font-size: 15px; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s, color 0.2s; }
        .tab.active { background-color: #2c3e50; color: white; }

        input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9; color: #2c3e50; font-size: 15px; outline: none; margin-bottom: 12px; display: block; }
        input:focus { border-color: #4caf50; }
        input::placeholder { color: #bbb; }

        .btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; margin-top: 4px; }
        .btn-submit.login-btn { background-color: #2c3e50; }
        .btn-submit.login-btn:hover { background-color: #1a252f; }
        .btn-submit.register-btn { background-color: #4caf50; }
        .btn-submit.register-btn:hover { background-color: #45a049; }

        .msg { font-size: 13px; margin-top: 14px; min-height: 20px; }
        .msg.error { color: #e53935; }
        .msg.success { color: #4caf50; }

        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🛠️ 내 도구 모음</h2>
    <p>계정으로 시작하세요</p>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">로그인</button>
        <button class="tab" onclick="switchTab('register')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div class="form-section active" id="loginForm">
        <input type="email" id="loginEmail" placeholder="이메일" onkeydown="if(event.key==='Enter') login()">
        <input type="password" id="loginPassword" placeholder="비밀번호" onkeydown="if(event.key==='Enter') login()">
        <button class="btn-submit login-btn" onclick="login()">로그인</button>
    </div>

    <!-- 회원가입 폼 -->
    <div class="form-section" id="registerForm">
        <input type="email" id="registerEmail" placeholder="이메일" onkeydown="if(event.key==='Enter') register()">
        <input type="password" id="registerPassword" placeholder="비밀번호 (6자 이상)" onkeydown="if(event.key==='Enter') register()">
        <input type="password" id="registerPasswordConfirm" placeholder="비밀번호 확인" onkeydown="if(event.key==='Enter') register()">
        <button class="btn-submit register-btn" onclick="register()">회원가입</button>
    </div>

    <div class="msg" id="msg"></div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    window.switchTab = function(tab) {
        document.getElementById('msg').textContent = '';
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
    }

    window.login = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const msg = document.getElementById('msg');

        if (!email || !password) {
            msg.className = 'msg error';
            msg.textContent = '이메일과 비밀번호를 입력해주세요!';
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'dashboard.html';
        } catch (e) {
            msg.className = 'msg error';
            msg.textContent = '❌ 이메일 또는 비밀번호가 올바르지 않아요';
        }
    }

    window.register = async function() {
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const confirm = document.getElementById('registerPasswordConfirm').value.trim();
        const msg = document.getElementById('msg');

        if (!email || !password || !confirm) {
            msg.className = 'msg error';
            msg.textContent = '모든 항목을 입력해주세요!';
            return;
        }
        if (password.length < 6) {
            msg.className = 'msg error';
            msg.textContent = '비밀번호는 6자 이상이어야 해요!';
            return;
        }
        if (password !== confirm) {
            msg.className = 'msg error';
            msg.textContent = '비밀번호가 일치하지 않아요!';
            return;
        }

        try {
            // 1. Firebase Auth 계정 생성
            const cred = await createUserWithEmailAndPassword(auth, email, password);

            // 2. Firestore에 유저 정보 저장 ✅
            await setDoc(doc(db, 'users', cred.user.uid), {
                email: email,
                role: 'user',
                banned: false,
                joinDate: new Date().toLocaleDateString('ko-KR')
            });

            msg.className = 'msg success';
            msg.textContent = '✅ 가입 완료! 로그인 중...';
            setTimeout(() => window.location.href = 'dashboard.html', 1000);

        } catch (e) {
            msg.className = 'msg error';
            msg.textContent = '❌ 이미 사용 중인 이메일이에요';
        }
    }
</script>
</body>
</html>
