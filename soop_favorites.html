<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOOP 즐겨찾기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; color: #2c3e50; font-family: 'Arial', sans-serif; min-height: 100vh; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background-color: #2c3e50; padding: 14px 30px; display: flex; align-items: center; gap: 16px; z-index: 999; }
        .navbar-title { font-size: 20px; font-weight: bold; color: white; }
        .btn-back { padding: 7px 14px; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; text-decoration: none; }
        .container { padding: 90px 30px 40px; max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 30px; background-color: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .top-bar input { flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9; color: #2c3e50; font-size: 15px; outline: none; }
        .top-bar input:focus { border-color: #4caf50; }
        .top-bar input::placeholder { color: #bbb; }
        .btn-add { padding: 10px 22px; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .btn-add:hover { background-color: #45a049; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background-color: white; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.12); }
        .card a { text-decoration: none; color: #2c3e50; display: block; }
        .profile-wrap { width: 100%; aspect-ratio: 1; overflow: hidden; background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; }
        .profile-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .card-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-id { font-size: 12px; color: #999; }
        .btn-delete { position: absolute; top: 8px; right: 8px; background-color: rgba(229,57,53,0.9); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .btn-delete:hover { background-color: #e53935; }
        .empty-state { text-align: center; padding: 80px 20px; color: #bbb; }
        .empty-state .icon { font-size: 60px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="navbar">
    <a href="dashboard.html" class="btn-back">← 메뉴로</a>
    <span class="navbar-title">📺 SOOP 즐겨찾기</span>
</div>

<div class="container">
    <div class="top-bar">
        <input type="text" id="inputId" placeholder="SOOP 스트리머 ID 입력 (예: woowakgood)" onkeydown="if(event.key==='Enter') addStreamer()">
        <button class="btn-add" onclick="addStreamer()">+ 추가</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">📺</div>
        <p>즐겨찾기한 스트리머가 없어요<br>위에서 SOOP ID를 입력해 추가해보세요!</p>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, addDoc, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        const q = query(collection(db, 'soopFavorites'), where('uid', '==', user.uid));
        onSnapshot(q, (snapshot) => {
            const streamers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            render(streamers);
        });
    });

    function render(streamers) {
        const grid = document.getElementById('grid');
        const emptyState = document.getElementById('emptyState');
        grid.innerHTML = '';
        if (streamers.length === 0) { emptyState.style.display = 'block'; return; }
        emptyState.style.display = 'none';
        streamers.forEach(s => {
            const profileImg = `https://profile.img.afreecatv.com/LOGO/${s.streamerId.substring(0,2)}/${s.streamerId}/${s.streamerId}.jpg`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="btn-delete" onclick="deleteStreamer('${s.id}')">✕</button>
                <a href="https://play.sooplive.com/${s.streamerId}" target="_blank">
                    <div class="profile-wrap"><img src="${profileImg}" alt="${s.streamerId}" onerror="this.style.display='none'"></div>
                    <div class="card-info"><div class="card-name">${s.streamerId}</div><div class="card-id">${s.streamerId}</div></div>
                </a>`;
            grid.appendChild(card);
        });
    }

    window.addStreamer = async function() {
        const input = document.getElementById('inputId');
        const streamerId = input.value.trim();
        if (!streamerId) return;
        await addDoc(collection(db, 'soopFavorites'), { uid: currentUser.uid, streamerId });
        input.value = '';
    }

    window.deleteStreamer = async function(id) {
        if (!confirm('삭제할까요?')) return;
        await deleteDoc(doc(db, 'soopFavorites', id));
    }
</script>
</body>
</html>
