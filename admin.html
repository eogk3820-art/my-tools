<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; color: #2c3e50; font-family: 'Arial', sans-serif; min-height: 100vh; }
        .admin-login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background-color: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { color: #2c3e50; margin-bottom: 8px; font-size: 22px; }
        .login-box p { color: #999; font-size: 13px; margin-bottom: 28px; }
        .login-box input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9; color: #2c3e50; font-size: 15px; outline: none; margin-bottom: 12px; }
        .login-box input:focus { border-color: #4caf50; }
        .btn-login { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-login:hover { background-color: #1a252f; }
        .login-error { color: #e53935; font-size: 13px; margin-top: 10px; display: none; }
        .admin-panel { display: none; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background-color: #2c3e50; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 999; }
        .navbar-title { font-size: 20px; font-weight: bold; color: white; }
        .btn-back { padding: 7px 14px; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn-logout-admin { padding: 7px 14px; background-color: #e53935; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .container { padding: 90px 30px 40px; max-width: 1100px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background-color: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .num { font-size: 32px; font-weight: bold; color: #2c3e50; }
        .stat-card .label { font-size: 13px; color: #999; margin-top: 6px; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; background-color: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); flex-wrap: wrap; }
        .toolbar input { flex: 1; min-width: 180px; padding: 10px 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9; color: #2c3e50; font-size: 14px; outline: none; }
        .toolbar input:focus { border-color: #4caf50; }
        .btn-success { padding: 10px 18px; background-color: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .btn-success:hover { background-color: #45a049; }
        .table-wrap { background-color: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #2c3e50; }
        th { padding: 14px 16px; text-align: left; font-size: 13px; color: #ccc; }
        td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f9fff9; }
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-sm-danger { background-color: #e53935; color: white; }
        .btn-sm-warn { background-color: #f39c12; color: white; }
        .btn-sm-success { background-color: #4caf50; color: white; }
        .empty-row td { text-align: center; color: #bbb; padding: 40px; }
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; }
        .modal-bg.show { display: flex; }
        .modal { background-color: white; border-radius: 16px; padding: 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 100%; max-width: 420px; }
        .modal h3 { margin-bottom: 20px; color: #2c3e50; }
        .modal input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9; color: #2c3e50; font-size: 14px; outline: none; margin-bottom: 12px; }
        .modal input:focus { border-color: #4caf50; }
        .modal-btns { display: flex; gap: 10px; margin-top: 8px; }
        .modal-btns button { flex: 1; padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-confirm { background-color: #4caf50; color: white; }
        .btn-cancel { background-color: #eee; color: #555; }
    </style>
</head>
<body>

<div class="admin-login" id="adminLogin">
    <div class="login-box">
        <h2>🔐 관리자 로그인</h2>
        <p>관리자 이메일로 로그인하세요</p>
        <input type="text" id="adminIdInput" placeholder="관리자 ID" onkeydown="if(event.key==='Enter') adminLogin()">
        <input type="password" id="adminPwInput" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter') adminLogin()">
        <button class="btn-login" onclick="adminLogin()">로그인</button>
        <div class="login-error" id="loginError">❌ 관리자 정보가 올바르지 않아요</div>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="navbar">
        <div style="display:flex;align-items:center;gap:16px;">
            <a href="dashboard.html" class="btn-back">← 메뉴로</a>
            <span class="navbar-title">🔐 관리자 페이지</span>
        </div>
        <button class="btn-logout-admin" onclick="adminLogout()">로그아웃</button>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">전체 회원</div></div>
            <div class="stat-card"><div class="num" id="statAdmin" style="color:#e53935;">0</div><div class="label">관리자</div></div>
            <div class="stat-card"><div class="num" id="statUser" style="color:#4caf50;">0</div><div class="label">일반 회원</div></div>
            <div class="stat-card"><div class="num" id="statBanned" style="color:#999;">0</div><div class="label">정지된 회원</div></div>
        </div>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="🔍 이메일로 검색..." oninput="renderTable()">
            <button class="btn-success" onclick="openAddModal()">+ 회원 추가</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>이메일</th><th>역할</th><th>가입일</th><th>상태</th><th>관리</th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 회원 추가 모달 -->
<div class="modal-bg" id="addModal">
    <div class="modal">
        <h3>➕ 회원 추가</h3>
        <input type="email" id="newEmail" placeholder="이메일">
        <input type="password" id="newPassword" placeholder="비밀번호 (6자 이상)">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('addModal')">취소</button>
            <button class="btn-confirm" onclick="addUser()">추가</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, onSnapshot, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const ADMIN_ID = 'admin';
    const ADMIN_PW = 'admin1234';

    let allUsers = [];

    window.adminLogin = function() {
        const id = document.getElementById('adminIdInput').value.trim();
        const pw = document.getElementById('adminPwInput').value.trim();
        if (id === ADMIN_ID && pw === ADMIN_PW) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadUsers();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    window.adminLogout = function() {
        document.getElementById('adminLogin').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
    }

    function loadUsers() {
        onSnapshot(collection(db, 'users'), (snapshot) => {
            allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
            updateStats();
        });
    }

    window.renderTable = function() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        const filtered = allUsers.filter(u => u.email?.toLowerCase().includes(query));
        if (filtered.length === 0) { tbody.innerHTML = `<tr class="empty-row"><td colspan="6">회원이 없어요 😅</td></tr>`; return; }
        filtered.forEach((u, i) => {
            const roleBadge = u.role === 'admin'
                ? `<span style="background:#e53935;color:white;padding:3px 10px;border-radius:12px;font-size:11px;">관리자</span>`
                : `<span style="background:#2c3e50;color:white;padding:3px 10px;border-radius:12px;font-size:11px;">일반</span>`;
            const statusBadge = u.banned
                ? `<span style="background:#ccc;color:#666;padding:3px 10px;border-radius:12px;font-size:11px;">정지</span>`
                : `<span style="color:#4caf50;font-size:13px;">✅ 정상</span>`;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#bbb;">${i+1}</td>
                <td><strong>${u.email || '-'}</strong></td>
                <td>${roleBadge}</td>
                <td style="color:#999;font-size:13px;">${u.joinDate || '-'}</td>
                <td>${statusBadge}</td>
                <td><div class="action-btns">
                    ${u.banned
                        ? `<button class="btn-sm btn-sm-success" onclick="toggleBan('${u.id}', false)">정지해제</button>`
                        : `<button class="btn-sm btn-sm-warn" onclick="toggleBan('${u.id}', true)">정지</button>`}
                    <button class="btn-sm btn-sm-danger" onclick="deleteUser('${u.id}')">삭제</button>
                </div></td>`;
            tbody.appendChild(tr);
        });
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = allUsers.length;
        document.getElementById('statAdmin').textContent = allUsers.filter(u => u.role==='admin').length;
        document.getElementById('statUser').textContent = allUsers.filter(u => u.role!=='admin' && !u.banned).length;
        document.getElementById('statBanned').textContent = allUsers.filter(u => u.banned).length;
    }

    window.openAddModal = function() {
        document.getElementById('newEmail').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('addModal').classList.add('show');
    }

    window.addUser = async function() {
        const email = document.getElementById('newEmail').value.trim();
        const password = document.getElementById('newPassword').value.trim();
        if (!email || !password) { alert('이메일과 비밀번호를 입력해주세요!'); return; }
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, 'users', cred.user.uid), {
                email, role: 'user', banned: false,
                joinDate: new Date().toLocaleDateString('ko-KR')
            });
            closeModal('addModal');
        } catch(e) { alert('이미 사용 중인 이메일이에요!'); }
    }

    window.toggleBan = async function(id, banned) {
        await updateDoc(doc(db, 'users', id), { banned });
    }

    window.deleteUser = async function(id) {
        if (!confirm('정말 삭제할까요?')) return;
        await deleteDoc(doc(db, 'users', id));
    }

    window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); }
</script>
</body>
</html>
