<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통장 잔고 현황</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; font-family: 'Arial', sans-serif; min-height: 100vh; }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 20px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        #welcomeMsg { font-size: 14px; color: #ccc; }
        .btn-logout {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid #ccc;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }
        .btn-back {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid #ccc;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 16px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            visibility: hidden;
        }

        /* 왼쪽 - 등록 */
        .write-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 24px;
        }
        .write-box h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 16px;
        }
        .write-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            background: #f9f9f9;
        }
        .write-box input:focus { border-color: #3498db; }
        .btn-add {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add:hover { background-color: #2980b9; }
        .btn-add:disabled { background-color: #aaa; cursor: not-allowed; }

        /* 오른쪽 - 목록 */
        .list-box { flex: 1; }

        /* 총 잔고 카드 */
        .total-card {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border-radius: 16px;
            padding: 24px 28px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(52,152,219,0.3);
        }
        .total-card .total-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .total-card .total-amount {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: -1px;
        }
        .total-card .total-count {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 8px;
        }

        /* 통장 카드 */
        .bank-card {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .bank-info { flex: 1; }
        .bank-name {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .bank-amount {
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
        }
        .bank-date {
            font-size: 12px;
            color: #bbb;
            margin-top: 4px;
        }
        .bank-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .btn-edit {
            padding: 7px 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-edit:hover { background: #1a252f; }
        .btn-delete {
            padding: 7px 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-delete:hover { background: #c62828; }

        .no-data {
            text-align: center;
            color: #bbb;
            font-size: 15px;
            padding: 40px 0;
        }

        /* 수정 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal h3 { margin-bottom: 16px; color: #2c3e50; }
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            background: #f9f9f9;
        }
        .modal-btns { display: flex; gap: 10px; }
        .btn-modal-save {
            flex: 1; padding: 11px;
            background: #3498db; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .btn-modal-save:hover { background: #2980b9; }
        .btn-modal-cancel {
            flex: 1; padding: 11px;
            background: #eee; color: #555;
            border: none; border-radius: 8px;
            font-size: 15px; cursor: pointer;
        }

        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .write-box { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:12px;">
        <a href="dashboard.html" class="btn-back">← 메뉴로</a>
        <h1>🏦 통장 잔고 현황</h1>
    </div>
    <div class="header-right">
        <span id="welcomeMsg"></span>
        <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
</div>

<div class="container" id="mainContainer">

    <!-- 왼쪽: 등록 -->
    <div class="write-box">
        <h3>➕ 통장 등록</h3>
        <input type="text" id="bankName" placeholder="은행명 (예: 국민은행)">
        <input type="number" id="bankAmount" placeholder="잔액 (원)" min="0">
        <button class="btn-add" id="addBtn" onclick="addBank()">💾 등록</button>
    </div>

    <!-- 오른쪽: 목록 -->
    <div class="list-box">

        <!-- 총 잔고 -->
        <div class="total-card">
            <div class="total-label">💰 전체 통장 합산 잔고</div>
            <div class="total-amount" id="totalAmount">0 원</div>
            <div class="total-count" id="totalCount">등록된 통장 0개</div>
        </div>

        <!-- 통장 목록 -->
        <div id="bankList"><div class="no-data">등록된 통장이 없습니다.</div></div>
    </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>✏️ 잔고 수정</h3>
        <input type="text" id="editBankName" placeholder="은행명">
        <input type="number" id="editBankAmount" placeholder="잔액 (원)" min="0">
        <div class="modal-btns">
            <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
            <button class="btn-modal-save" onclick="updateBank()">저장</button>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
        collection, addDoc, getDocs, deleteDoc,
        updateDoc, doc, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser = null;
    let editingDocId = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        document.getElementById('welcomeMsg').textContent = `👋 ${user.email}님`;
        document.getElementById('mainContainer').style.visibility = 'visible';
        await loadBanks();
    });

    window.logout = async function () {
        await signOut(auth);
        window.location.href = 'index.html';
    }

    window.addBank = async function () {
        const name = document.getElementById('bankName').value.trim();
        const amount = document.getElementById('bankAmount').value.trim();
        const addBtn = document.getElementById('addBtn');

        if (!name) { alert('은행명을 입력해주세요.'); return; }
        if (amount === '') { alert('잔액을 입력해주세요.'); return; }

        addBtn.disabled = true;
        addBtn.textContent = '등록 중...';

        try {
            await addDoc(collection(db, 'banks'), {
                uid: currentUser.uid,
                name: name,
                amount: Number(amount),
                updatedAt: new Date()
            });
            document.getElementById('bankName').value = '';
            document.getElementById('bankAmount').value = '';
            await loadBanks();
        } catch (e) {
            alert('등록 중 오류가 발생했습니다.');
            console.error(e);
        }

        addBtn.disabled = false;
        addBtn.textContent = '💾 등록';
    }

    async function loadBanks() {
        const bankList = document.getElementById('bankList');
        bankList.innerHTML = '';

        try {
            const q = query(
                collection(db, 'banks'),
                where('uid', '==', currentUser.uid),
                orderBy('updatedAt', 'desc')
            );
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                bankList.innerHTML = '<div class="no-data">등록된 통장이 없습니다.</div>';
                document.getElementById('totalAmount').textContent = '0 원';
                document.getElementById('totalCount').textContent = '등록된 통장 0개';
                return;
            }

            let total = 0;
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                total += Number(data.amount);
                const date = data.updatedAt?.toDate().toLocaleString('ko-KR') || '';

                const card = document.createElement('div');
                card.className = 'bank-card';
                card.innerHTML = `
                    <div class="bank-info">
                        <div class="bank-name">🏦 ${escapeHtml(data.name)}</div>
                        <div class="bank-amount">${Number(data.amount).toLocaleString('ko-KR')} 원</div>
                        <div class="bank-date">최근 수정: ${date}</div>
                    </div>
                    <div class="bank-actions">
                        <button class="btn-edit" onclick="openEdit('${docSnap.id}', '${escapeHtml(data.name)}', ${data.amount})">수정</button>
                        <button class="btn-delete" onclick="deleteBank('${docSnap.id}')">삭제</button>
                    </div>
                `;
                bankList.appendChild(card);
            });

            document.getElementById('totalAmount').textContent = total.toLocaleString('ko-KR') + ' 원';
            document.getElementById('totalCount').textContent = `등록된 통장 ${snapshot.size}개`;

        } catch (e) {
            console.error(e);
            bankList.innerHTML = '<div class="no-data">데이터를 불러오지 못했습니다.</div>';
        }
    }

    window.deleteBank = async function (id) {
        if (!confirm('이 통장을 삭제할까요?')) return;
        await deleteDoc(doc(db, 'banks', id));
        await loadBanks();
    }

    window.openEdit = function (id, name, amount) {
        editingDocId = id;
        document.getElementById('editBankName').value = name;
        document.getElementById('editBankAmount').value = amount;
        document.getElementById('editModal').classList.add('active');
    }

    window.closeModal = function () {
        editingDocId = null;
        document.getElementById('editModal').classList.remove('active');
    }

    window.updateBank = async function () {
        const name = document.getElementById('editBankName').value.trim();
        const amount = document.getElementById('editBankAmount').value.trim();

        if (!name) { alert('은행명을 입력해주세요.'); return; }
        if (amount === '') { alert('잔액을 입력해주세요.'); return; }

        await updateDoc(doc(db, 'banks', editingDocId), {
            name: name,
            amount: Number(amount),
            updatedAt: new Date()
        });

        closeModal();
        await loadBanks();
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
